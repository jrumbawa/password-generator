<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
      integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Karla:wght@800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1 class="title">
          Generate a <span class="accent-text">random password</span>
        </h1>
        <p class="subtitle">Never use an insecure password again</p>
        <button class="btn">
          <i class="fa-solid fa-bolt"></i> Generate passwords
        </button>
      </header>
      <section class="passwords">
        <div class="password"><i class="fa-solid fa-ellipsis"></i></div>
        <div class="password"><i class="fa-solid fa-ellipsis"></i></div>
        <div class="password"><i class="fa-solid fa-ellipsis"></i></div>
        <div class="password"><i class="fa-solid fa-ellipsis"></i></div>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
